name = "fortnum"
version = "0.1.0"
description = "Primal-first, derivative-ready clean-room Fortran numerical library"
author = "Christopher Albert"
maintainer = "albert@tugraz.at"
license = "MIT"
copyright = "Copyright 2025, lazy-fortran"

[dev-dependencies]
test-drive = { git = "https://github.com/fortran-lang/test-drive.git" }

[build]
auto-tests = true
# roots/fortnum_roots_complex.f90 calls LAPACK ZGGEV; link LAPACK and its BLAS
# so the fpm/fo build resolves it without relying on the default library path.
link = ["lapack", "blas"]

[fortran]
implicit-typing = false
source-form = "free"
